version: '3.8'

services:
  minerador:
    build: .
    restart: always
    ports:
      - "8000:8000" # Mapeia a porta 8000 do container para a 8000 do seu notebook
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - minerador