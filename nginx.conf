events {}

http {
    upstream backend {
        server minerador:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Configuração de CORS para permitir chamadas da Vercel
        location / {
            # Se quiser liberar para qualquer origem durante os testes:
            add_header 'Access-Control-Allow-Origin' '*' always;
            # Em produção, substitua o '*' pela URL da sua Vercel:
            # add_header 'Access-Control-Allow-Origin' 'https://seu-front.vercel.app' always;
            
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

            # Trata requisições OPTIONS (Preflight do CORS)
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}